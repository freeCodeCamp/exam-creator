name: "version-bump"

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        required: true
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  create-version-bump-pr:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: get current version and calculate new version
        id: version
        uses: actions/github-script@v7
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        with:
          script: |
            const fs = require('fs')
            const cargoToml = fs.readFileSync('./Cargo.toml', 'utf8')
            const versionMatch = cargoToml.match(/version\s*=\s*"(\d+\.\d+\.\d+)"/)
            if (!versionMatch) {
              throw new Error('Version not found in Cargo.toml')
            }
            const version = versionMatch[1]
            const [major, minor, patch] = version.split('.').map(Number)

            let newVersion
            if (process.env.RELEASE_TYPE === 'major') {
              newVersion = `${major + 1}.0.0`
            } else if (process.env.RELEASE_TYPE === 'minor') {
              newVersion = `${major}.${minor + 1}.0`
            } else {
              newVersion = `${major}.${minor}.${patch + 1}`
            }

            core.setOutput('current_version', version)
            core.setOutput('new_version', newVersion)
            console.log(`Bumping version from ${version} to ${newVersion}`)

      - name: update Cargo.toml and Cargo.lock
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.new_version }}"/' Cargo.toml
          cargo update server

      - name: update package.json
        run: |
          npm version ${{ inputs.release_type }} --no-git-tag-version

      - name: generate changelog entry
        id: changelog
        uses: actions/github-script@v7
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        with:
          script: |
            const fs = require('fs')
            const { execSync } = require('child_process')

            const git = (args) => execSync(`git ${args}`, { encoding: 'utf8' }).trim()

            let lastRelease
            try {
              lastRelease = git(`log --grep='^release(' -1 --format=%H`)
            } catch {
              lastRelease = ''
            }
            const range = lastRelease ? `${lastRelease}..HEAD` : 'HEAD'

            const SEP = '---COMMIT---'
            const raw = git(`log ${range} --format='${SEP}%n%s%n%b'`)
            const commits = raw
              .split(SEP)
              .map((c) => c.trim())
              .filter(Boolean)

            const sections = { Added: [], Changed: [], Fixed: [], Removed: [] }
            const sectionForType = (type) => {
              if (type === 'feat') return 'Added'
              if (type === 'fix') return 'Fixed'
              if (type === 'revert') return 'Removed'
              return 'Changed'
            }

            for (const commit of commits) {
              const [subjectLine, ...bodyLines] = commit.split('\n')
              const match = subjectLine.match(/^(\w+)(?:\(([^)]+)\))?!?:\s*(.+)$/)
              if (!match) continue
              const [, type, scope, subject] = match
              if (type === 'release') continue

              let entry = scope ? `- ${scope}: ${subject}` : `- ${subject}`
              const body = bodyLines.join('\n').trim()
              if (body) {
                for (const paragraph of body.split(/\n{2,}/)) {
                  entry += `\n  - ${paragraph.replace(/\n/g, ' ').trim()}`
                }
              }
              sections[sectionForType(type)].push(entry)
            }

            const date = new Date().toISOString().slice(0, 10)
            let section = `## [${process.env.NEW_VERSION}] - ${date}\n`
            for (const [heading, entries] of Object.entries(sections)) {
              if (!entries.length) continue
              section += `\n### ${heading}\n\n${entries.join('\n')}\n`
            }

            const changelog = fs.readFileSync('./CHANGELOG.md', 'utf8')
            const insertAt = changelog.search(/^## \[\d+\.\d+\.\d+\]/m)
            if (insertAt === -1) {
              throw new Error('No existing version heading found in CHANGELOG.md')
            }
            const updated = changelog.slice(0, insertAt) + section + '\n' + changelog.slice(insertAt)
            fs.writeFileSync('./CHANGELOG.md', updated)

            core.setOutput('section', section)
            console.log(section)

      - name: create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "release(${{ inputs.release_type }}): ${{ steps.version.outputs.new_version }}"
          branch: release/v${{ steps.version.outputs.new_version }}
          delete-branch: true
          title: "release(${{ inputs.release_type }}): ${{ steps.version.outputs.new_version }}"
          body: |
            ## Version Bump: ${{ inputs.release_type }}

            This PR bumps the version from `${{ steps.version.outputs.current_version }}` to `${{ steps.version.outputs.new_version }}`.

            ## Changelog

            ${{ steps.changelog.outputs.section }}

            ### Next Steps

            Once this PR is merged, the deploy workflow will automatically trigger to publish a new image.
